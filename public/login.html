<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>

    <link rel="stylesheet" href="css/login.css">
</head>

<body>
    <div id="navbar">
        <div class="nav_content">
            <div id="nav_logo">
                <img src="assets/imgs/logo.png" alt="">

                <span id="txt_logo">Gambito<span class="txt_destaque">Tech</span></span>
            </div>

            <div class="nav_links">
                <a href="index.html">Home</a>
                <a href="#oQueE">Sobre</a>
                <a href="">Como jogar?</a>
                <p>|</p>
                <a href="login.html">Login</a>
                <a href="cadastro.html">Cadastro</a>
            </div>
        </div>
    </div>

    <div id="login_section">
        <div class="card_login">
            <div id="head_login">
                <img src="assets/imgs/logo.png" alt="">
                <span id="txt_logo">Gambito<span class="txt_destaque">Tech</span></span>
            </div>

            <div id="corpo_login">
                <div id="inputs_corpo">
                    <div class="input_login">
                        <p class="txt_input">E-mail</p>
                        <input type="text" id="ipt_email" placeholder="usuario@gmail.com">
                    </div>

                    <div class="input_login">
                        <p class="txt_input">Senha</p>
                        <input type="password" id="ipt_senha" placeholder="********">
                    </div>

                </div>

                <button id="botao_logar" onclick="entrar()">Logar</button>

                <div id="cadastro_txt">Não possui conta? <a href="cadastro.html">fazer cadastro</a></div>
            </div>
        </div>
    </div>


</body>

</html>

<script>
    function entrar() {
        // aguardar();

        var emailVar = ipt_email.value;
        var senhaVar = ipt_senha.value;

        if (emailVar == "" || senhaVar == "") {
            // cardErro.style.display = "block"
            // mensagem_erro.innerHTML = "(Mensagem de erro para todos os campos em branco)";
            alert("Todos os campo estão em branco!");
            // finalizarAguardar();
            return false;
        }
        else {
            // setInterval(sumirMensagem, 5000);
        }

        console.log("FORM LOGIN: ", emailVar);
        console.log("FORM SENHA: ", senhaVar);

        fetch("/usuarios/autenticar", {
            method: "POST",
            headers: {
                "Content-Type": "application/json"
            },
            body: JSON.stringify({
                emailServer: emailVar,
                senhaServer: senhaVar
            })
        }).then(function (resposta) {
            console.log("ESTOU NO THEN DO entrar()!")

            if (resposta.ok) {
                console.log(resposta);

                resposta.json().then(json => {
                    console.log(json);
                    console.log(JSON.stringify(json));
                    sessionStorage.EMAIL_USUARIO = json.email;
                    sessionStorage.NOME_USUARIO = json.nome;
                    sessionStorage.ID_USUARIO = json.id;
                    sessionStorage.RATING_USUARIO = json.rating;

                    setTimeout(function () {
                        window.location = "./dashboard/perfil.html";
                    }, 1000); // apenas para exibir o loading

                });

            } else {

                console.log("Houve um erro ao tentar realizar o login!");
                alert("Email ou/e senha inválido(s)");

                ipt_email.value = "";
                ipt_senha.value = "";

                resposta.text().then(texto => {
                    console.error(texto);
                    // finalizarAguardar(texto);
                });
            }

        }).catch(function (erro) {
            console.log("To no catch");
            console.log(erro);
        })

        return false;
    }

    // function sumirMensagem() {
    //     cardErro.style.display = "none"
    // }
</script>
