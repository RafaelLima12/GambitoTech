<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>

    <link rel="stylesheet" href="css/login.css">
</head>

<body>


    <div id="login_section">


        <div class="card_login">
            <div id="head_login">

                <img src="assets/imgs/logo.png" alt="">
                <span id="txt_logo">Gambito<span class="txt_destaque">Tech</span></span>

            </div>

            <div id="corpo_login">
                <div id="inputs_corpo">
                    <div class="input_login">
                        <p class="txt_input">e-mail</p>
                        <input type="text" id="ipt_email" placeholder="usuario@gmail.com">
                    </div>

                    <div class="input_login">
                        <p class="txt_input">Senha</p>
                        <input type="password" id="ipt_senha" placeholder="********">
                    </div>

                </div>

                <button id="botao_logar">Logar</button>
            </div>
        </div>


    </div>


</body>

</html>
