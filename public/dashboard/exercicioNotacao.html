<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Quiz de Xadrez</title>

<style>
:root {
    --fundo: #303030;
    --verde: #739e45;
    --texto: #EEEED2;
}

body {
    background-color: var(--fundo);
    color: var(--texto);
    font-family: Arial;
    display: flex;
    justify-content: center;
}

#container {
    width: 500px;
    margin-top: 40px;
}

img {
    width: 100%;
    border-radius: 10px;
    margin-bottom: 10px;
}

button {
    margin-top: 10px;
    padding: 10px;
    border-radius: 10px;
    border: none;
    background-color: var(--verde);
    color: white;
    cursor: pointer;
}
</style>

</head>

<body>

<div id="container">

    <h2 id="pergunta"></h2>

    <img id="imgQuestao">

    <div>
        <input type="radio" name="opt" value="A"> <span id="A"></span><br>
        <input type="radio" name="opt" value="B"> <span id="B"></span><br>
        <input type="radio" name="opt" value="C"> <span id="C"></span><br>
        <input type="radio" name="opt" value="D"> <span id="D"></span><br>
    </div>

    <button onclick="responder()">Responder</button>
    <button onclick="proxima()">Próxima</button>

    <p id="resultado"></p>

</div>

<script>

const questoes = [
{
    pergunta: "Qual a notação correta para o cavalo?",
    img: "/assets/imgs_exercicios/img_notacao/notacao1.png",
    A: "Cg3",
    B: "Bg3",
    C: "Tg3",
    D: "Dg3",
    correta: "A"
},
{
    pergunta: "Qual a notação correta do peão?",
    img: "/assets/imgs_exercicios/img_notacao/notacao2.png",
    A: "Pe5",
    B: "e5",
    C: "Ce5",
    D: "Te5",
    correta: "B"
},
{
    pergunta: "Qual a jogada da dama?",
    img: "/assets/imgs_exercicios/img_notacao/notacao3.png",
    A: "Dd5",
    B: "Cd5",
    C: "Bd5",
    D: "Td5",
    correta: "A"
}
];

let atual = 0;
let pontos = 0;

function carregar() {
    let q = questoes[atual];

    document.getElementById("pergunta").innerText = q.pergunta;
    document.getElementById("imgQuestao").src = q.img;

    A.innerText = q.A;
    B.innerText = q.B;
    C.innerText = q.C;
    D.innerText = q.D;

    document.getElementById("resultado").innerText = "";
}

function responder() {
    let selecionado = document.querySelector('input[name="opt"]:checked');

    if (!selecionado) {
        alert("Escolha uma opção!");
        return;
    }

    if (selecionado.value === questoes[atual].correta) {
        pontos++;
        resultado.innerText = "✔ Acertou!";
    } else {
        resultado.innerText = "✖ Errou!";
    }
}

function proxima() {
    atual++;

    if (atual < questoes.length) {
        limpar();
        carregar();
    } else {
        document.getElementById("container").innerHTML =
            "<h2>Fim do quiz</h2><p>Pontuação: " + pontos + "</p>";
    }
}

function limpar() {
    document.querySelectorAll('input[name="opt"]').forEach(e => e.checked = false);
}

carregar();

</script>

</body>
</html>
