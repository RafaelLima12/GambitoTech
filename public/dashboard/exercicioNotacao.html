<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <title>Quiz de Xadrez</title>
    <link rel="stylesheet" href="../css/exercicios.css">
</head>

<body onload="carregarQuestoes()">
    <div id="navbar">
        <div class="nav_content">
            <div id="nav_logo">
                <img src="../assets/imgs/logo.png" alt="">

                <span id="txt_logo">Gambito<span id="txt_destaque_logo">Tech</span></span>
            </div>

            <div class="nav_links">
                <a href="../index.html">Home</a>
                <a href="../dashboard/dashboard.html">Dashboard</a>
                <p>|</p>
                <a href="login.html">Login</a>
                <a href="cadastro.html">Cadastro</a>
            </div>
        </div>
    </div>
    <div id="exercicio_section">

        <div id="exercicio">
            <div id="info_exercicio">
                <h2>Rating do exercicio: <span id="ratingPergunta"></span></h2>
            </div>

            <div id="img_e_nome">
                <h1 id="nome"></h1>
                <img id="imgQuestao">
                <h3 id="desc"></h3>
                <h3 id="resultado"></h3>

            </div>

            <div id="info_user">
                <h2>Seu rating: <span id="rating_user"></span></h2>
                <span id="rating_ganho"></span>
            </div>
        </div>

        <div id="inputs">
            <input type="text" id="ipt_resposta" placeholder="Digite sua resposta">

            <div id="btns">
                <button onclick="responder()" id="btn_responder">Responder</button>
                <button onclick="proxima()" id="btn_proxima">Próxima</button>
            </div>
        </div>

    </div>

</body>

</html>

<script>

    let respondeu = false;

    let questoes = [];
    var rating = Number(sessionStorage.RATING_USUARIO);
    let idUser = sessionStorage.ID_USUARIO;
    let ratingInicial = rating;
    // let ratingFinal = rating;

    function carregarQuestoes() {
        respondeu = false;
        fetch(`/exercicios/exercicios/${rating}/notacao`)
            .then(res => res.json())
            .then(data => {
                questoes = data;
                carregar();
            })
    }

    // ============================

    let atual = 0;

    function carregar() {
        ipt_resposta.value = "";
        respondeu = false;
        let q = questoes[atual];

        if (!q) {
            console.log("Exercicios não encontrados!");
            return;
        }

        document.getElementById("nome").innerText = q.nome;
        document.getElementById("imgQuestao").src = q.img;
        document.getElementById("ratingPergunta").innerText = q.rating;
        document.getElementById('desc').innerText = q.descricao;
        document.getElementById("resultado").innerText = "";
        rating_user.innerHTML = rating;

        rating_ganho.innerHTML = "";
    }

    function responder() {

        if (respondeu == true) {
            alert("Você já respondeu essa pergunta");
            return;
        }

        respondeu = true;
        let respostaUser = ipt_resposta.value;

        let diferenca = rating - questoes[atual].rating;

        if (!respostaUser) {
            alert("Digite a sua resposta!");
            return;
        }

        let ratingAntes = rating;
        if (respostaUser === questoes[atual].resposta) {
            resultado.innerText = "Acertou!";

            if (diferenca == 0) {
                rating += parseInt(questoes[atual].rating * (5 / 100)); // Calculo de porcentagem para o rating final
            } else if (diferenca < 0) {
                rating += parseInt(questoes[atual].rating * (8 / 100));
            } else {
                rating += parseInt(questoes[atual].rating * (2 / 100));
            }

            rating_ganho.innerHTML = `+${rating - ratingAntes}`;
            rating_ganho.style.color = "#739e45";
        } else {
            resultado.innerText = "Errou!";

            if (diferenca == 0) {
                rating -= parseInt(questoes[atual].rating * (8 / 100)); // Calculo de porcentagem para o rating final
            } else if (diferenca < 0) {
                rating -= parseInt(questoes[atual].rating * (2 / 100));
            } else {
                rating -= parseInt(questoes[atual].rating * (10 / 100));
            }

            rating_ganho.innerHTML = `${rating - ratingAntes}`;
            rating_ganho.style.color = "#c0392b";
        }

        fetch("/usuarios/atualizarRating", {
            method: "POST",
            headers: {
                "Content-Type": "application/json"
            },
            body: JSON.stringify({
                ratingServer: rating,
                idServer: idUser
            })
        }).then(function (resposta) {
            console.log("ESTOU NO THEN DO atualizarRating!")

            if (resposta.ok) {
                console.log(resposta);

                resposta.json().then(json => {
                    console.log(json);
                    console.log(JSON.stringify(json));
                    sessionStorage.RATING_USUARIO = json.rating;
                });

            } else {
                console.log("Houve um erro ao tentar atualizar o rating!");

                resposta.text().then(texto => {
                    console.error(texto);
                    // finalizarAguardar(texto);
                });
            }

        }).catch(function (erro) {
            console.log("To no catch");
            console.log(erro);
        })


        //Adicionar o resultado na tabela exercicioRespondido
        fetch("/exercicios/responder", {
            method: "POST",
            headers: {
                "Content-Type": "application/json"
            },
            body: JSON.stringify({
                fkUsuario: idUser,
                fkExercicio: questoes[atual].id,
                ratingUserDepois: rating,
                acertou: respostaUser === questoes[atual].resposta ? 1 : 0
            })
        })
            .then(res => {
                if (!res.ok) throw new Error("Erro ao salvar resposta");
            })
            .catch(erro => {
                console.error("Erro ao salvar resposta:", erro);
                res.status(500).json(erro);
            });
    }

    function proxima() {
        if (!respondeu) {
            alert("Responda antes de ir para o proximo exercicio");
            return;
        }

        atual++;

        if (atual < questoes.length) {
            limpar();
            carregar();
        } else {
            document.getElementById("exercicio_section").innerHTML = `<h1>Fim dos exercicios</h1>
                                                                      <H2>Rating inicial: ${ratingInicial}</h2>
                                                                      <h2>Rating final: ${rating}</h2>
                                                                      <h2 style="color:${rating > ratingInicial ? '#739e45' : '#c0392b'}">
                                                                      ${rating > ratingInicial ? '+' : ''}${rating - ratingInicial}</h2>
                                                                      
                                                                      
                                                                      <div id="btns_final">
                                                                      <a href="../dashboard/dashboard.html"><button>Dashboard</button></a>
                                                                      <a href="../dashboard/perfil.html"><button>Perfil</button></a>
                                                                      <button onclick="location.reload()">Tentar novamente</button>
                                                                      </div>`;
        }
    }

    function limpar() {
        document.querySelectorAll('input[name="opt"]').forEach(e => e.checked = false);
    }
</script>
