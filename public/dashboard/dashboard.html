<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="../css/dashboard.css">
</head>

<body onload="carregarInfo()">
    <div id="navbar">
        <div class="nav_content">
            <div id="nav_logo">
                <img src="../assets/imgs/logo.png" alt="">

                <span id="txt_logo">Gambito<span id="txt_destaque_logo">Tech</span></span>
            </div>

            <div class="nav_links">
                <a href="../index.html">Home</a>
                <a href="../dashboard/dashboard.html">Dashboard</a>
                <p>|</p>
                <a href="login.html">Login</a>
                <a href="cadastro.html">Cadastro</a>
            </div>
        </div>
    </div>

    <div id="dashboard_section">
        <div id="kpi_section">


            <div class="kpi">
                <div class="titulo_kpi">
                    <span class="titulo_kpi">Rating atual</span>
                </div>
                <div class="info_kpi">
                    <span class="txt_info_kpi" id="ratingUserKPI">300</span>
                </div>
            </div>

            <div class="kpi">
                <div class="titulo_kpi">
                    <span class="titulo_kpi">Rating mais alto</span>
                </div>
                <div class="info_kpi">
                    <span class="txt_info_kpi">350</span>
                </div>
            </div>

            <div class="kpi">
                <div class="titulo_kpi">
                    <span class="titulo_kpi">Ponto fraco</span>
                </div>
                <div class="info_kpi">
                    <span class="txt_info_kpi">Temas táticos</span>
                </div>
            </div>

            <div class="kpi">
                <div class="titulo_kpi">
                    <span class="txt_titulo_kpi">Seu nível</span>
                </div>
                <div class="info_kpi">
                    <span class="txt_info_kpi">Capivara</span>
                </div>
            </div>


        </div>


        <div id="graficos_section">

            <div id="grafico_linha">
                <div>
                    <canvas id="graficoLinha"></canvas>
                </div>

                <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
            </div>



            <div id="grafico_pizza">
                <div>
                    <canvas id="graficoPizza"></canvas>
                </div>

                <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
            </div>

        </div>
    </div>
</body>

</html>


<script>
    const ctx = document.getElementById('graficoLinha');

    new Chart(ctx, {
        type: 'line',
        data: {
            labels: ['Red', 'Blue', 'Yellow', 'Green', 'Purple', 'Orange'],
            datasets: [{
                label: 'Rating',
                data: [12, 19, 3, 5, 2, 3],

                borderColor: '#739e45',      // cor da linha
                backgroundColor: '#739e4533', // cor do preenchimento (transparente)
                borderWidth: 2,
                tension: 0.4,
            }]
        },
        options: {
            scales: {
                y: {
                    beginAtZero: true
                }
            }
        }
    });


    const pizza = document.getElementById('graficoPizza');

    new Chart(pizza, {
        type: 'pie',
        data: {
            labels: ['Acertos', 'Erros'],
            datasets: [{
                label: 'Acertos e erros',
                data: [12, 6],
                backgroundColor: [
                    '#739e45', // Define a cor dos acertos
                    '#a93226'  // Define a cor dos erros
                ],
                borderWidth: 1
            }]
        },
        options: {
            scales: {
                y: {
                    beginAtZero: true
                }
            }
        }
    });


    function carregarInfo() {
        var ratingAtual = sessionStorage.RATING_USUARIO;
        ratingUserKPI.innerHTML = ratingAtual;
    }
</script>
