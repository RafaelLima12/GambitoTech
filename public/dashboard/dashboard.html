<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard</title>
    <link rel="stylesheet" href="../css/dashboard.css">
    <script src="../js/perfil.js"></script>
</head>

<body onload="carregar_infos()">
    <div id="navbar">
        <div class="nav_content">
            <div id="nav_logo">
                <img src="../assets/imgs/logo.png" alt="">

                <span id="txt_logo">Gambito<span id="txt_destaque_logo">Tech</span></span>
            </div>

            <div class="nav_links">
                <a href="../index.html">Home</a>
                <a href="../dashboard/dashboard.html">Dashboard</a>
                <p>|</p>
                <a href="perfil.html">Perfil</a>
                <a href="cadastro.html">Cadastro</a>
            </div>
        </div>
    </div>


    <div id="dashboard_section">
        <div id="kpi_section">


            <div class="kpi">
                <div class="titulo_kpi">
                    <span class="titulo_kpi">Rating atual</span>
                </div>
                <div class="info_kpi">
                    <span class="txt_info_kpi" id="rating_usuario">300</span>
                </div>
                <span id="diferenca_rating"></span>
            </div>

            <div class="kpi">
                <div class="titulo_kpi">
                    <span class="titulo_kpi">Rating mais alto</span>
                </div>
                <div class="info_kpi">
                    <span class="txt_info_kpi" id="rating_mais_alto">300</span>
                </div>
                <span id="dt_rating_mais_alto">undefined</span>
            </div>

            <div class="kpi">
                <div class="titulo_kpi">
                    <span class="titulo_kpi">Ponto fraco</span>
                </div>
                <div class="info_kpi">
                    <span class="txt_info_kpi" id="ponto_fraco_kpi">Xadrez</span>
                </div>
                <span id="proporcao_acerto">0,00%</span>
            </div>

            <div class="kpi">
                <div class="titulo_kpi">
                    <span class="txt_titulo_kpi">Seu nível atual</span>
                </div>
                <div class="info_kpi">
                    <span class="txt_info_kpi" id="nivel_usuario">Indefinido</span>
                </div>
                <span id="prx_nivel_txt"></span>
            </div>


        </div>

        <div id="graficos_section">

            <div id="grafico_linha">
                <span class="txt_grafico">Sua evolução de Rating</span>
                <div>
                    <canvas id="graficoLinha"></canvas>
                </div>

                <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
            </div>



            <div id="grafico_pizza">
                <span class="txt_grafico">Acertos e erros dos exercícios</span>
                <div>
                    <canvas id="graficoPizza"></canvas>
                </div>

                <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
            </div>

        </div>
    </div>
</body>

</html>


<script>

    var ratingMaisAlto = 300;
    var idUser = sessionStorage.ID_USUARIO;

    function carregar_infos() {
        carregarInfoPerfil();
        carregarGraficos();
        pontoFraco();
    }

    function carregarGraficos() {

        fetch(`/dashboard/infoGraficoLinha/${idUser}`).then(function (response) {
            if (response.ok) {
                response.json().then(function (resposta) {
                    console.log(`Dados recebidos: ${JSON.stringify(resposta)}`);
                    plotarGraficoLinha(resposta);
                });
            } else {
                console.error('Nenhum dado encontrado ou erro na API');
            }
        })
            .catch(function (error) {
                console.error(`Erro na obtenção dos dados p/ gráfico: ${error.message}`);
            });

        fetch(`/dashboard/infoGraficoPizza/${idUser}`).then(function (response) {
            if (response.ok) {
                response.json().then(function (resposta) {
                    console.log(`Dados recebidos: ${JSON.stringify(resposta)}`);
                    plotarGraficoPizza(resposta);
                    kpiInfo(resposta);
                });
            } else {
                console.error('Nenhum dado encontrado ou erro na API');
            }
        })
            .catch(function (error) {
                console.error(`Erro na obtenção dos dados p/ gráfico: ${error.message}`);
            });
    }




    function plotarGraficoPizza(dados) {
        const pizza = document.getElementById('graficoPizza');

        let graficoPizza = new Chart(pizza, {
            type: 'pie',
            data: {
                labels: ['Acertos', 'Erros'],
                datasets: [{
                    label: 'Acertos e erros',
                    data: [],
                    backgroundColor: [
                        '#739e45', // Define a cor dos acertos
                        '#a93226'  // Define a cor dos erros
                    ],
                    borderWidth: 1
                }]
            },
            options: {
                scales: {
                    y: {
                        beginAtZero: true
                    }
                }
            }
        });

        graficoPizza.data.datasets[0].data.push(dados[0].acertos);
        graficoPizza.data.datasets[0].data.push(dados[0].erros);


        graficoPizza.update();
    }


    function plotarGraficoLinha(dados) {
        let ctx = document.getElementById('graficoLinha');
        let labels = [];

        let graficoLinha = new Chart(ctx, {
            type: 'line',
            data: {
                labels: labels,
                datasets: [{
                    label: 'Rating',
                    data: [],

                    borderColor: '#739e45',      // cor da linha
                    backgroundColor: '#739e4533', // cor do preenchimento (transparente)
                    borderWidth: 2,
                    tension: 0.4,
                }]
            },
            options: {
                scales: {
                    y: {
                        beginAtZero: true
                    }
                }
            }
        });

        for (i = dados.length - 1; i >= 0; i--) {
            var registro = dados[i];
            graficoLinha.data.labels.push(registro.dataRegistro);
            graficoLinha.data.datasets[0].data.push(registro.ratingUserDepois);
        }

        graficoLinha.update();
    }

    function pontoFraco() {
        fetch(`/dashboard/buscarPontoFraco/${idUser}`).then(function (response) {
            if (response.ok) {
                response.json().then(function (resposta) {
                    console.log(`Dados recebidos: ${JSON.stringify(resposta)}`);

                    ponto_fraco_kpi.innerHTML = resposta[0].tipo;
                    proporcao_acerto.innerHTML = `Taxa de acertos: ${resposta[0].proporcao_resposta_acerto}%`;
                });
            } else {
                console.error('Nenhum dado encontrado ou erro na API');
            }
        })
            .catch(function (error) {
                console.error(`Erro na obtenção dos dados p/ gráfico: ${error.message}`);
            });
    }


    function kpiInfo(resposta) {
        let niveis = [300, 500, 1000, 1600, 2200, 2300, 2400, 2500];
        ratingMaisAlto = resposta[0].maior_rating;
        rating_mais_alto.innerText = ratingMaisAlto;
        dt_rating_mais_alto.innerText = resposta[0].data_maior_rating;

        if (ratingMaisAlto > sessionStorage.RATING_USUARIO) {
            diferenca_rating.innerText = `↓${ratingMaisAlto - sessionStorage.RATING_USUARIO}`;
            diferenca_rating.style.color = "#c0392b";
        } else {
            diferenca_rating.innerText = "";
        }

        if (sessionStorage.RATING_USUARIO >= 2500) {
            prx_nivel_txt.innerText = `Nível máximo atingido!!! PARABÉNS`;
            prx_nivel_txt.style.color = "#739e45";
        } else {
            for (let i = 0; i < niveis.length; i++) {
                if (sessionStorage.RATING_USUARIO < niveis[i]) {
                    prx_nivel_txt.innerText = `+${(niveis[i] - sessionStorage.RATING_USUARIO)} de rating para o próximo nível`;
                    prx_nivel_txt.style.color = "#739e45";
                    break;
                }
            }
        }
    }
</script>
