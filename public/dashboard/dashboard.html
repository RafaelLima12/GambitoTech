<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard</title>
    <link rel="stylesheet" href="../css/dashboard.css">
    <script src="../js/perfil.js"></script>
    <script src="../js/dashboard.js"></script>
</head>

<body onload="carregar_infos()">
    <div id="navbar">
        <div class="nav_content">
            <div id="nav_logo">
                <img src="../assets/imgs/logo.png" alt="">

                <span id="txt_logo">Gambito<span id="txt_destaque_logo">Tech</span></span>
            </div>

            <div class="nav_links">
                <a href="../index.html">Home</a>
                <a href="../dashboard/dashboard.html">Dashboard</a>
                <p>|</p>
                <a href="perfil.html">Perfil</a>
                <a href="cadastro.html">Cadastro</a>
            </div>
        </div>
    </div>

    <div id="main_section">

        <div id="side_bar">
            <div id="bar_txts">
                <div class="bar_txt" onclick="mostrarDash()">
                    <img src="../assets/imgs/grafico.png" alt="" class="icon_bar">
                    <span class="txt_bar">Dashboard</span>
                </div>

                <div class="bar_txt" onclick="plotarRanking()">
                    <img src="../assets/imgs/trofeu.png" alt="" class="icon_bar">
                    <span class="txt_bar">Ranking</span>
                </div>
            </div>
        </div>

        <div id="ranking_section">
            <div id="head_ranking_section">
                <img src="../assets/imgs/trofeu.png" alt=""><span>RANKING DOS USUÁRIOS DO SITE!</span>
            </div>

            <div id="ranking_block">
                <div id="head_ranking">
                    <span>TOP PLAYERS⭐</span>
                </div>

                <div id="ranking_players">
                    
                </div>
            </div>

        </div>


        <div id="dashboard_section">
            <div id="kpi_section">


                <div class="kpi">
                    <div class="titulo_kpi">
                        <span class="titulo_kpi">Rating atual</span>
                    </div>
                    <div class="info_kpi">
                        <span class="txt_info_kpi" id="rating_usuario">300</span>
                    </div>
                    <span id="diferenca_rating"></span>
                </div>

                <div class="kpi">
                    <div class="titulo_kpi">
                        <span class="titulo_kpi">Rating mais alto</span>
                    </div>
                    <div class="info_kpi">
                        <span class="txt_info_kpi" id="rating_mais_alto">300</span>
                    </div>
                    <span id="dt_rating_mais_alto">undefined</span>
                </div>

                <div class="kpi">
                    <div class="titulo_kpi">
                        <span class="titulo_kpi">Ponto fraco</span>
                    </div>
                    <div class="info_kpi">
                        <span class="txt_info_kpi" id="ponto_fraco_kpi">Xadrez</span>
                    </div>
                    <span id="proporcao_acerto">0,00%</span>
                </div>

                <div class="kpi">
                    <div class="titulo_kpi">
                        <span class="txt_titulo_kpi">Seu nível atual</span>
                    </div>
                    <div class="info_kpi">
                        <span class="txt_info_kpi" id="nivel_usuario">Indefinido</span>
                    </div>
                    <span id="prx_nivel_txt"></span>
                </div>


            </div>

            <div id="graficos_section">

                <div id="grafico_linha">
                    <span class="txt_grafico">Sua evolução de Rating</span>
                    <div>
                        <canvas id="graficoLinha"></canvas>
                    </div>

                    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
                </div>



                <div id="grafico_pizza">
                    <span class="txt_grafico">Acertos e erros dos exercícios</span>
                    <div>
                        <canvas id="graficoPizza"></canvas>
                    </div>

                    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
                </div>

            </div>
        </div>
    </div>
</body>

</html>


<script>


</script>
