<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro</title>
    <link rel="stylesheet" href="css/cadastro.css">
</head>

<body>

    <div id="navbar">
        <div class="nav_content">
            <div id="nav_logo">
                <img src="assets/imgs/logo.png" alt="">

                <span id="txt_logo">Gambito<span class="txt_destaque">Tech</span></span>
            </div>

            <div class="nav_links">
                <a href="index.html">Home</a>
                <a href="#oQueE">Sobre</a>
                <a href="">Como jogar?</a>
                <p>|</p>
                <a href="login.html">Login</a>
                <a href="cadastro.html">Cadastro</a>
            </div>
        </div>
    </div>

    <div id="cadastro_section">


        <div class="card_cadastro">
            <div id="head_cadastro">
                <img src="assets/imgs/logo.png" alt="">
                <span id="txt_logo">Gambito<span class="txt_destaque">Tech</span></span>
            </div>

            <div id="corpo_cadastro">



                <div id="inputs_corpo">

                    <div class="input_cadastro">
                        <p class="txt_input">Nome</p>
                        <input type="text" id="ipt_nome" placeholder="Seu nome">
                        <div id="txt_verificarNome"></div>
                    </div>


                    <div class="input_cadastro">
                        <p class="txt_input">E-mail</p>
                        <input type="email" id="ipt_email" placeholder="usuario@gmail.com">
                        <div id="txt_verificarEmail"></div>
                    </div>

                    <div class="input_cadastro">
                        <p class="txt_input">Senha</p>
                        <input type="password" id="ipt_senha" placeholder="********">
                        <div id="txt_verificarSenha"></div>

                    </div>

                    <div class="input_cadastro">
                        <p class="txt_input">Confirmar senha</p>
                        <input type="password" id="ipt_confirmar_senha" placeholder="********">
                        <div id="txt_verificarConfirmar"></div>
                    </div>


                </div>

                <button id="botao_logar" onclick="verificarCampos()">Cadastrar</button>

                <div id="cadastro_txt">Já possui conta? <a href="login.html">fazer login</a></div>
            </div>
        </div>


    </div>

</body>

</html>

<script>
    function cadastrar(nome, email, senha) {

        fetch("/usuarios/cadastrar", {
            method: "POST",
            headers: {
                "Content-Type": "application/json",
            },
            body: JSON.stringify({
                nomeServer: nome,
                emailServer: email,
                senhaServer: senha
            }),
        })
            .then(function (resposta) {
                console.log("resposta: ", resposta);

                if (resposta.ok) {
                    // cardErro.style.display = "block";

                    // mensagem_erro.innerHTML =
                    //     "Cadastro realizado com sucesso! Redirecionando para tela de Login...";

                    setTimeout(() => {
                        window.location = "login.html";
                    }, "2000");

                } else {
                    throw "Houve um erro ao tentar realizar o cadastro!";
                }
            })
            .catch(function (resposta) {
                console.log(`#ERRO: ${resposta}`);
            });
    }


    function verificarCampos() {
        let email = ipt_email.value;
        let nome = ipt_nome.value;
        let senha = ipt_senha.value;
        let confirmarSenha = ipt_confirmar_senha.value;

        txt_verificarEmail.innerHTML = "";
        txt_verificarConfirmar.innerHTML = "";
        txt_verificarNome.innerHTML = "";
        txt_verificarSenha.innerHTML = "";

        let emailValido = false;
        let nomeValido = false;
        let senhaValida = false;

        let caracteres = ["!", "@", "#", "$", "%", "&", "*", "?", "/", "-", "+"]

        //Verificação do email
        if (email == "") {
            txt_verificarEmail.innerHTML = '<p style="color: #c94c4c;">O Email é um campo obrigatório</p>';
        } else if (!email.includes("@")) {
            txt_verificarEmail.innerHTML = '<p style="color: #c94c4c;">Email inválido. Adicione o @</p>';
        } else if (!email.includes(".com") && !email.includes(".school")) {
            txt_verificarEmail.innerHTML = '<p style="color: #c94c4c;">Email inválido.</p>';
        } else if (email.indexOf("@") > email.lastIndexOf(".com") && email.indexOf("@") > email.lastIndexOf(".school")) {
            txt_verificarEmail.innerHTML = '<p style="color: #c94c4c;">Email inválido. A ordem está incorreta</p>';
        } else {
            emailValido = true;
            txt_verificarEmail.innerHTML = '<p style="color: #739e45;">Email válido</p>';
        }

        //Verificação do nome
        if (nome == "") {
            txt_verificarNome.innerHTML = '<p style="color: #c94c4c;">O nome é um campo obrigatório</p>';
        } else if (nome.length < 3) {
            txt_verificarNome.innerHTML = '<p style="color: #c94c4c;">O nome precisa ter ao menos 3 caracteres</p>';
        } else {
            txt_verificarNome.innerHTML = '<p style="color: #739e45;">Nome válido</p>';
            nomeValido = true;
        }

        //verificação da senha
        if (senha == "") {
            txt_verificarSenha.innerHTML = `<p style="color: #c94c4c;">A senha é um campo obrigatório</p>`;
        } else if (senha.length < 6) {
            txt_verificarSenha.innerHTML = `<p style="color: #c94c4c;">A senha precisa ter ao menos 6 caracteres</p>`;
        } else {
            for (let i = 0; i < caracteres.length; i++) {
                if (senha.includes(caracteres[i])) {
                    senhaValida = true;
                    txt_verificarSenha.innerHTML = `<p style="color: #739e45;">Senha válida</p>`;
                    break;
                }
            }

            if (!senhaValida) {
                txt_verificarSenha.innerHTML = `<p style="color: #c94c4c;">A senha precisa ter ao menos 1 caracter especial</p>`;
            }
        }

        if (confirmarSenha == "") {
            txt_verificarConfirmar.innerHTML = `<p style="color: #c94c4c;">Confirme a senha</p>`;
            return;
        } else if (senha != confirmarSenha) {
            txt_verificarConfirmar.innerHTML = `<p style="color: #c94c4c;">A senha e a confirmação estão diferentes</p>`;
            return;
        }





        if (emailValido && nomeValido && senhaValida) {
            alert("Cadastro realizado com sucesso");
            cadastrar(nome, email, senha);
        } 
    }
</script>
